<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Manager</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f5f7;
  --surface: #fff;
  --border: #e1e4e8;
  --text: #24292e;
  --muted: #6a737d;
  --blue: #0366d6;
  --green: #28a745;
  --orange: #e36209;
  --red: #d73a49;
  --radius: 6px;
  --mono: 'SF Mono','Fira Code','Consolas',monospace;
}
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

/* Layout */
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; }
.main { margin-left: 220px; flex: 1; padding: 24px; }

/* Sidebar */
.sidebar-logo { padding: 18px 16px 12px; font-weight: 700; font-size: 15px; border-bottom: 1px solid var(--border); }
.sidebar-logo span { color: var(--blue); }
.sidebar-section { padding: 12px 8px 4px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text); margin: 1px 4px; }
.sidebar-item:hover { background: var(--bg); }
.sidebar-item.active { background: #e8f0fe; color: var(--blue); font-weight: 600; }
.sidebar-item .icon { font-size: 15px; width: 18px; text-align: center; }
.claude-status { margin: auto 8px 12px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 12px; }
.claude-status .label { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
.claude-status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.dot.ok { background: var(--green); }
.dot.limited { background: var(--red); }

/* Page header */
.page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.page-header h2 { font-size: 18px; font-weight: 700; flex: 1; }
.btn { padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 500; background: var(--surface); color: var(--text); }
.btn:hover { background: var(--bg); }
.btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn.primary:hover { background: #0256b9; }
.btn.danger { background: var(--red); color: #fff; border-color: var(--red); }
.btn.sm { padding: 4px 10px; font-size: 12px; }

/* Cards */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: box-shadow 0.1s; }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
.card-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; min-height: 18px; }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
.badge.active { color: var(--green); border-color: #c3e6cb; background: #f0fff4; }
.badge.paused { color: var(--orange); border-color: #ffd6a5; background: #fff8f0; }
.badge.completed { color: var(--muted); background: var(--bg); }
.progress-wrap { flex: 1; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; background: var(--green); border-radius: 2px; }
.progress-label { font-size: 11px; color: var(--muted); }

/* Project detail */
.back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--blue); font-size: 13px; cursor: pointer; margin-bottom: 16px; }
.back-btn:hover { text-decoration: underline; }
.section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.milestone-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.milestone-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; }
.milestone-header:hover { background: var(--bg); }
.milestone-name { font-weight: 600; flex: 1; }
.milestone-body { border-top: 1px solid var(--border); }
.task-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 1px solid var(--border); }
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: var(--bg); }
.task-check { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 3px; cursor: pointer; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.task-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.task-check.progress { background: var(--blue); border-color: var(--blue); color: #fff; }
.task-title { flex: 1; font-size: 13px; }
.task-title.done { text-decoration: line-through; color: var(--muted); }
.task-actions { display: flex; gap: 4px; opacity: 0; }
.task-row:hover .task-actions { opacity: 1; }
.add-task-row { padding: 8px 16px; }
.inline-form { display: flex; gap: 8px; }
.inline-form input, .inline-form select { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; }
.inline-form input:focus, .inline-form select:focus { outline: none; border-color: var(--blue); }

/* Modal */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 15px; }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--muted); }
.field input, .field textarea, .field select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--blue); }
.field textarea { resize: vertical; min-height: 80px; }

/* Claude status page */
.status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.stat-box .slabel { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-box .svalue { font-size: 26px; font-weight: 700; margin-top: 2px; }
.big-status { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.big-dot { width: 14px; height: 14px; border-radius: 50%; flex: 0 0 auto; }
.big-status-text .title { font-weight: 600; font-size: 15px; }
.big-status-text .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.queue-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.queue-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.queue-row:last-child { border-bottom: none; }
.queue-row.header { background: var(--bg); font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
.priority-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.priority-badge.high { background: #fdecea; color: var(--red); }
.priority-badge.normal { background: var(--bg); color: var(--muted); }

/* Empty states */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: #24292e; color: #fff; padding: 10px 18px; border-radius: var(--radius); font-size: 13px; z-index: 999; animation: slideIn 0.2s; }
@keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>
<div class="shell">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">PM <span>System</span></div>
    <div class="sidebar-section">導覽</div>
    <div class="sidebar-item active" id="nav-projects" onclick="navigate('projects')">
      <span class="icon">📁</span> 專案管理
    </div>
    <div class="sidebar-item" id="nav-claude" onclick="navigate('claude')">
      <span class="icon">🤖</span> Claude 狀態
    </div>
    <div class="sidebar-item" id="nav-explorer" onclick="window.open('/api-explorer','_blank')">
      <span class="icon">🔍</span> API Explorer
    </div>
    <div class="claude-status" id="sidebar-claude">
      <div class="label">Claude</div>
      <div><span class="dot ok" id="sidebar-dot"></span><span id="sidebar-status-text">載入中…</span></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
const API = '';
let currentPage = 'projects';
let currentProject = null;

// ── Navigation ──────────────────────────────────────────
function navigate(page, data) {
  currentPage = page;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  if (page === 'projects' && data) { currentProject = data; renderProjectDetail(); }
  else if (page === 'projects') { currentProject = null; renderProjects(); }
  else if (page === 'claude') renderClaude();
}

// ── API helpers ─────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok && res.status !== 204) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ── Claude sidebar status ───────────────────────────────
async function refreshSidebarStatus() {
  try {
    const s = await api('/api/claude/status');
    const dot = document.getElementById('sidebar-dot');
    const txt = document.getElementById('sidebar-status-text');
    if (s.is_rate_limited) {
      dot.className = 'dot limited';
      txt.textContent = `限速 ${s.minutes_until_reset ?? '?'}min`;
    } else {
      dot.className = 'dot ok';
      txt.textContent = '可用';
    }
  } catch {}
}

// ── Projects list ───────────────────────────────────────
async function renderProjects() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="page-header">
      <h2>專案管理</h2>
      <button class="btn primary" onclick="showCreateProject()">+ 新增專案</button>
    </div>
    <div class="card-grid" id="project-grid"><div class="empty"><div class="icon">⏳</div><p>載入中…</p></div></div>`;
  const projects = await api('/api/projects/');
  const grid = document.getElementById('project-grid');
  if (!projects.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">📁</div><p>還沒有專案，點右上角新增一個</p></div>`;
    return;
  }
  grid.innerHTML = projects.map(p => {
    const tasks = p.tasks || [];
    const done = tasks.filter(t => t.status === 'completed').length;
    const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;
    return `
    <div class="card" onclick="navigate('projects', ${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="card-title">${esc(p.name)}</div>
      <div class="card-desc">${esc(p.description || '無說明')}</div>
      <div class="card-meta">
        <span class="badge ${p.status}">${statusLabel(p.status)}</span>
        <div class="progress-wrap">
          <div class="progress-label">${done}/${tasks.length} 任務</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Project detail ──────────────────────────────────────
async function renderProjectDetail() {
  const p = currentProject;
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading" style="padding:40px;color:var(--muted)">載入中…</div>`;
  const project = await api(`/api/projects/${p.id}`);
  currentProject = project;

  const milestones = project.milestones || [];
  const looseTasks = (project.tasks || []).filter(t => !t.milestone_id);

  main.innerHTML = `
    <div class="back-btn" onclick="navigate('projects')">← 返回專案列表</div>
    <div class="page-header">
      <h2>${esc(project.name)}</h2>
      <button class="btn sm" onclick="showEditProject(${project.id}, '${esc(project.name)}', '${esc(project.description||'')}', '${project.status}')">編輯</button>
      <button class="btn sm danger" onclick="deleteProject(${project.id})">刪除</button>
      <button class="btn primary" onclick="showCreateMilestone(${project.id})">+ Milestone</button>
    </div>
    ${project.description ? `<p style="color:var(--muted);margin-bottom:20px;font-size:13px">${esc(project.description)}</p>` : ''}

    <div class="section-title">Milestones</div>
    <div id="milestones-list">
      ${milestones.map(m => renderMilestone(m, project)).join('')}
      ${!milestones.length ? '<p style="color:var(--muted);font-size:13px;margin-bottom:16px">尚無 Milestone，點右上角新增</p>' : ''}
    </div>

    ${looseTasks.length || true ? `
    <div class="section-title" style="margin-top:20px">未分類任務</div>
    <div class="milestone-card">
      <div class="milestone-body">
        ${looseTasks.map(t => renderTask(t, project.id)).join('')}
        <div class="add-task-row">
          <div class="inline-form">
            <input id="loose-task-input" placeholder="新增任務…" onkeydown="if(event.key==='Enter')addTask(${project.id}, null, 'loose-task-input')">
            <button class="btn sm" onclick="addTask(${project.id}, null, 'loose-task-input')">新增</button>
          </div>
        </div>
      </div>
    </div>` : ''}`;
}

function renderMilestone(m, project) {
  const tasks = (project.tasks || []).filter(t => t.milestone_id === m.id);
  const done = tasks.filter(t => t.status === 'completed').length;
  return `
  <div class="milestone-card">
    <div class="milestone-header" onclick="toggleMilestone(this)">
      <span class="milestone-name">${esc(m.name)}</span>
      <span class="badge ${m.status}">${msStatusLabel(m.status)}</span>
      <span style="font-size:12px;color:var(--muted)">${done}/${tasks.length}</span>
      <button class="btn sm" onclick="event.stopPropagation();showEditMilestone(${project.id},${m.id},'${esc(m.name)}','${m.status}')">編輯</button>
      <button class="btn sm danger" onclick="event.stopPropagation();deleteMilestone(${project.id},${m.id})">刪除</button>
    </div>
    <div class="milestone-body" id="ms-body-${m.id}">
      ${tasks.map(t => renderTask(t, project.id)).join('')}
      <div class="add-task-row">
        <div class="inline-form">
          <input id="task-input-${m.id}" placeholder="新增任務…" onkeydown="if(event.key==='Enter')addTask(${project.id},${m.id},'task-input-${m.id}')">
          <button class="btn sm" onclick="addTask(${project.id},${m.id},'task-input-${m.id}')">新增</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderTask(t, projectId) {
  const isDone = t.status === 'completed';
  const isProgress = t.status === 'in_progress';
  const checkClass = isDone ? 'done' : isProgress ? 'progress' : '';
  const checkIcon = isDone ? '✓' : isProgress ? '▶' : '';
  return `
  <div class="task-row" id="task-${t.id}">
    <div class="task-check ${checkClass}" onclick="cycleTask(${projectId},${t.id},'${t.status}')">${checkIcon}</div>
    <span class="task-title ${isDone ? 'done' : ''}">${esc(t.title)}</span>
    <div class="task-actions">
      <button class="btn sm danger" onclick="deleteTask(${projectId},${t.id})">✕</button>
    </div>
  </div>`;
}

function toggleMilestone(header) {
  const body = header.nextElementSibling;
  body.style.display = body.style.display === 'none' ? '' : 'none';
}

// ── Task operations ─────────────────────────────────────
async function cycleTask(projectId, taskId, current) {
  const next = { todo: 'in_progress', in_progress: 'completed', completed: 'todo' };
  await api(`/api/projects/${projectId}/tasks/${taskId}`, { method: 'PATCH', body: { status: next[current] } });
  await renderProjectDetail();
}

async function addTask(projectId, milestoneId, inputId) {
  const input = document.getElementById(inputId);
  const title = input.value.trim();
  if (!title) return;
  await api(`/api/projects/${projectId}/tasks`, { method: 'POST', body: { title, milestone_id: milestoneId || null } });
  input.value = '';
  await renderProjectDetail();
}

async function deleteTask(projectId, taskId) {
  if (!confirm('刪除這個任務？')) return;
  await api(`/api/projects/${projectId}/tasks/${taskId}`, { method: 'DELETE' });
  await renderProjectDetail();
  toast('任務已刪除');
}

// ── Milestone operations ────────────────────────────────
async function deleteMilestone(projectId, milestoneId) {
  if (!confirm('刪除這個 Milestone？')) return;
  await api(`/api/projects/${projectId}/milestones/${milestoneId}`, { method: 'DELETE' });
  await renderProjectDetail();
  toast('Milestone 已刪除');
}

// ── Project operations ──────────────────────────────────
async function deleteProject(projectId) {
  if (!confirm('確定刪除這個專案？所有任務也會一起刪除。')) return;
  await api(`/api/projects/${projectId}`, { method: 'DELETE' });
  navigate('projects');
  toast('專案已刪除');
}

// ── Modals ──────────────────────────────────────────────
function showModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').style.display = 'flex';
}
function closeModal(e) {
  if (e.target === document.getElementById('overlay')) document.getElementById('overlay').style.display = 'none';
}
function closeModalForce() { document.getElementById('overlay').style.display = 'none'; }

function showCreateProject() {
  showModal(`
    <div class="modal-header">新增專案</div>
    <div class="modal-body">
      <div class="field"><label>專案名稱</label><input id="m-name" placeholder="輸入名稱…"></div>
      <div class="field"><label>說明（選填）</label><textarea id="m-desc" placeholder="這個專案的目標…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModalForce()">取消</button>
      <button class="btn primary" onclick="createProject()">建立</button>
    </div>`);
}

async function createProject() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return;
  await api('/api/projects/', { method: 'POST', body: { name, description: document.getElementById('m-desc').value } });
  closeModalForce();
  renderProjects();
  toast('專案已建立');
}

function showEditProject(id, name, desc, status) {
  showModal(`
    <div class="modal-header">編輯專案</div>
    <div class="modal-body">
      <div class="field"><label>名稱</label><input id="m-name" value="${esc(name)}"></div>
      <div class="field"><label>說明</label><textarea id="m-desc">${esc(desc)}</textarea></div>
      <div class="field"><label>狀態</label>
        <select id="m-status">
          <option value="active" ${status==='active'?'selected':''}>進行中</option>
          <option value="paused" ${status==='paused'?'selected':''}>暫停</option>
          <option value="completed" ${status==='completed'?'selected':''}>已完成</option>
          <option value="archived" ${status==='archived'?'selected':''}>封存</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModalForce()">取消</button>
      <button class="btn primary" onclick="editProject(${id})">儲存</button>
    </div>`);
}

async function editProject(id) {
  await api(`/api/projects/${id}`, { method: 'PATCH', body: {
    name: document.getElementById('m-name').value.trim(),
    description: document.getElementById('m-desc').value,
    status: document.getElementById('m-status').value,
  }});
  closeModalForce();
  const p = await api(`/api/projects/${id}`);
  currentProject = p;
  renderProjectDetail();
  toast('已儲存');
}

function showCreateMilestone(projectId) {
  showModal(`
    <div class="modal-header">新增 Milestone</div>
    <div class="modal-body">
      <div class="field"><label>名稱</label><input id="m-name" placeholder="例：Phase 1 完成"></div>
      <div class="field"><label>說明（選填）</label><textarea id="m-desc"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModalForce()">取消</button>
      <button class="btn primary" onclick="createMilestone(${projectId})">建立</button>
    </div>`);
}

async function createMilestone(projectId) {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return;
  await api(`/api/projects/${projectId}/milestones`, { method: 'POST', body: { name, description: document.getElementById('m-desc').value } });
  closeModalForce();
  renderProjectDetail();
  toast('Milestone 已建立');
}

function showEditMilestone(projectId, milestoneId, name, status) {
  showModal(`
    <div class="modal-header">編輯 Milestone</div>
    <div class="modal-body">
      <div class="field"><label>名稱</label><input id="m-name" value="${esc(name)}"></div>
      <div class="field"><label>狀態</label>
        <select id="m-status">
          <option value="pending" ${status==='pending'?'selected':''}>待開始</option>
          <option value="in_progress" ${status==='in_progress'?'selected':''}>進行中</option>
          <option value="completed" ${status==='completed'?'selected':''}>已完成</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModalForce()">取消</button>
      <button class="btn primary" onclick="editMilestone(${projectId},${milestoneId})">儲存</button>
    </div>`);
}

async function editMilestone(projectId, milestoneId) {
  await api(`/api/projects/${projectId}/milestones/${milestoneId}`, { method: 'PATCH', body: {
    name: document.getElementById('m-name').value.trim(),
    status: document.getElementById('m-status').value,
  }});
  closeModalForce();
  renderProjectDetail();
  toast('已儲存');
}

// ── Claude status page ──────────────────────────────────
async function renderClaude() {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="page-header"><h2>Claude 狀態</h2><button class="btn" onclick="renderClaude()">重新整理</button></div><div style="color:var(--muted)">載入中…</div>`;
  const s = await api('/api/claude/status');
  const sessions = await api('/api/claude/sessions?limit=5');
  const queue = await api('/api/claude/queue');

  const isOk = !s.is_rate_limited;
  main.innerHTML = `
    <div class="page-header">
      <h2>Claude 狀態</h2>
      <button class="btn" onclick="renderClaude()">重新整理</button>
      ${s.is_rate_limited ? `<button class="btn primary" onclick="resolveRateLimit()">手動解除限速</button>` : ''}
      <button class="btn" onclick="showAddQueue()">+ 加入待續接</button>
    </div>
    <div class="big-status">
      <div class="big-dot" style="background:${isOk ? 'var(--green)' : 'var(--red)'}"></div>
      <div class="big-status-text">
        <div class="title">${isOk ? 'Claude 可用' : '目前被限速'}</div>
        <div class="sub">${s.is_rate_limited ? `預計 ${s.minutes_until_reset ?? '?'} 分鐘後恢復 · 重置時間：${fmtTime(s.rate_limit_reset_at)}` : '可以正常使用 Claude Code'}</div>
      </div>
    </div>
    <div class="status-grid">
      <div class="stat-box"><div class="slabel">今日 Sessions</div><div class="svalue">${s.today_sessions}</div></div>
      <div class="stat-box"><div class="slabel">今日 Tokens</div><div class="svalue">${fmtNum(s.today_tokens)}</div></div>
      <div class="stat-box"><div class="slabel">待續接任務</div><div class="svalue" style="color:var(--orange)">${s.queue_count}</div></div>
    </div>

    <div class="section-title">待續接任務佇列</div>
    <div class="queue-table" style="margin-bottom:20px">
      <div class="queue-row header"><span style="flex:1">任務描述</span><span style="width:80px">優先度</span><span style="width:100px">操作</span></div>
      ${!queue.length ? '<div class="queue-row" style="color:var(--muted)">目前沒有待續接的任務</div>' : ''}
      ${queue.map(q => `
        <div class="queue-row">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${esc(q.description)}</div>
            ${q.checkpoint ? `<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px">${esc(q.checkpoint)}</div>` : ''}
          </div>
          <span class="priority-badge ${q.priority > 0 ? 'high' : 'normal'}" style="width:80px">${q.priority > 0 ? '優先' : '一般'}</span>
          <div style="width:100px;display:flex;gap:4px">
            <button class="btn sm primary" onclick="resumeQueue(${q.id})">續接</button>
            <button class="btn sm danger" onclick="cancelQueue(${q.id})">取消</button>
          </div>
        </div>`).join('')}
    </div>

    <div class="section-title">近期 Sessions</div>
    <div class="queue-table">
      <div class="queue-row header"><span style="flex:1">時間</span><span style="width:100px">狀態</span><span style="width:80px">Tokens</span><span style="width:60px">回合</span></div>
      ${!sessions.length ? '<div class="queue-row" style="color:var(--muted)">尚無 session 記錄</div>' : ''}
      ${sessions.map(s => `
        <div class="queue-row">
          <div style="flex:1;font-size:12px">${fmtTime(s.started_at)}</div>
          <span class="badge ${s.exit_reason === 'rate_limited' ? 'paused' : 'active'}" style="width:100px">${s.exit_reason || 'normal'}</span>
          <span style="width:80px;font-size:12px">${fmtNum((s.input_tokens||0)+(s.output_tokens||0))}</span>
          <span style="width:60px;font-size:12px">${s.turns}</span>
        </div>`).join('')}
    </div>`;
}

async function resolveRateLimit() {
  await api('/api/claude/rate-limit/resolve', { method: 'POST' });
  toast('限速已解除');
  renderClaude();
}

async function resumeQueue(id) {
  await api(`/api/claude/queue/${id}/resume`, { method: 'POST' });
  toast('已標記為已續接');
  renderClaude();
}

async function cancelQueue(id) {
  await api(`/api/claude/queue/${id}`, { method: 'DELETE' });
  toast('已取消');
  renderClaude();
}

function showAddQueue() {
  showModal(`
    <div class="modal-header">加入待續接任務</div>
    <div class="modal-body">
      <div class="field"><label>任務描述</label><input id="m-desc" placeholder="要繼續做什麼？"></div>
      <div class="field"><label>中斷點（選填）</label><textarea id="m-ckpt" placeholder="上次做到哪裡…"></textarea></div>
      <div class="field"><label>優先度</label>
        <select id="m-pri"><option value="0">一般</option><option value="1">優先</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModalForce()">取消</button>
      <button class="btn primary" onclick="addQueue()">加入佇列</button>
    </div>`);
}

async function addQueue() {
  const desc = document.getElementById('m-desc').value.trim();
  if (!desc) return;
  await api('/api/claude/queue', { method: 'POST', body: {
    description: desc,
    checkpoint: document.getElementById('m-ckpt').value,
    priority: parseInt(document.getElementById('m-pri').value),
  }});
  closeModalForce();
  renderClaude();
  toast('已加入佇列');
}

// ── Helpers ─────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function statusLabel(s) { return {active:'進行中',paused:'暫停',completed:'已完成',archived:'封存'}[s]||s; }
function msStatusLabel(s) { return {pending:'待開始',in_progress:'進行中',completed:'已完成'}[s]||s; }
function fmtNum(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n||0); }
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Init ─────────────────────────────────────────────────
navigate('projects');
refreshSidebarStatus();
setInterval(refreshSidebarStatus, 30000);
</script>
</body>
</html>
